<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litesite Catalog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#a9a9a9">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="s/css/catalog.css">
</head>

<body>

  <main>
    <section id="catalog-grid">
      <div data-theme="brown">
        <img src="s/img/litesite-cover/litesite-brown-tr-index.webp" alt="Brown Theme">
      </div>
      <div data-theme="blue">
        <img src="s/img/litesite-cover/litesite-blue-tr-index.webp" alt="Blue Theme">
      </div>
      <div data-theme="red">
        <img src="s/img/litesite-cover/litesite-red-tr-index.webp" alt="Red Theme">
      </div>
      <div data-theme="pink">
        <img src="s/img/litesite-cover/litesite-pink-tr-index.webp" alt="Pink Theme">
      </div>
    </section>
  </main>

  <div id="detail-view">
    <button id="detail-back">&#8592; Geri</button>
    <div id="detail-images"></div>
  </div>

  <button id="view-toggle">Mobil</button>

  <script src="s/js/catalog.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

</body>

</html>

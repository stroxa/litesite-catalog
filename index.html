<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litesite Catalog</title>
  <link rel="stylesheet" href="s/css/catalog.css">
</head>

<body>

  <div id="catalog-grid">
    <div class="theme-card" data-theme="brown">
      <img src="s/img/litesite-cover/litesite-brown-tr-index.jpg" alt="Brown Theme">
    </div>
    <div class="theme-card" data-theme="blue">
      <img src="s/img/litesite-cover/litesite-blue-tr-index.jpg" alt="Blue Theme">
    </div>
    <div class="theme-card" data-theme="red">
      <img src="s/img/litesite-cover/litesite-red-tr-index.jpg" alt="Red Theme">
    </div>
    <div class="theme-card" data-theme="pink">
      <img src="s/img/litesite-cover/litesite-pink-tr-index.jpg" alt="Pink Theme">
    </div>

  </div>

  <div id="detail-view">
    <button id="detail-back">&#8592; Geri</button>
    <div id="detail-images"></div>
  </div>

  <button id="view-toggle">Mobil</button>

  <script src="s/js/catalog.js"></script>

</body>

</html>
